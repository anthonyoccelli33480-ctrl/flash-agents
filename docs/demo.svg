<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="420" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="898" height="418" rx="15" fill="none" stroke="#2a2a38" stroke-width="2"/>
  <!-- header -->
  <text x="32" y="48" fill="#e8e8f0" font-family="system-ui,sans-serif" font-size="22" font-weight="700">⚡ Flash Review</text>
  <rect x="720" y="24" width="148" height="32" rx="16" fill="#3dd68c22" stroke="#3dd68c"/>
  <text x="794" y="45" fill="#3dd68c" font-family="monospace" font-size="14" text-anchor="middle">412 ms</text>
  <!-- input -->
  <text x="32" y="88" fill="#8888a0" font-family="monospace" font-size="11">INPUT</text>
  <rect x="32" y="98" width="836" height="72" rx="10" fill="#1a1a24" stroke="#2a2a38"/>
  <text x="48" y="128" fill="#e8e8f0" font-family="monospace" font-size="13">function divide(a, b) { return a / b; }</text>
  <text x="48" y="152" fill="#8888a0" font-family="monospace" font-size="13">// no zero check</text>
  <!-- arrow -->
  <text x="450" y="198" fill="#ff6b2c" font-family="system-ui" font-size="28" text-anchor="middle" filter="url(#glow)">⚡</text>
  <!-- output json -->
  <text x="32" y="228" fill="#8888a0" font-family="monospace" font-size="11">OUTPUT · JSON</text>
  <rect x="32" y="238" width="836" height="160" rx="10" fill="#0a0a0c" stroke="#ff6b2c55"/>
  <text x="48" y="264" fill="#3dd68c" font-family="monospace" font-size="12">{</text>
  <text x="64" y="286" fill="#e8e8f0" font-family="monospace" font-size="12">"score": 62,</text>
  <text x="64" y="308" fill="#ff5c5c" font-family="monospace" font-size="12">"critical": [{"issue": "division by zero", "fix": "if (b===0) throw..."}],</text>
  <text x="64" y="330" fill="#f5c542" font-family="monospace" font-size="12">"verdict": "fix_first"</text>
  <text x="48" y="352" fill="#3dd68c" font-family="monospace" font-size="12">}</text>
  <!-- footer -->
  <text x="450" y="400" fill="#8888a0" font-family="system-ui" font-size="13" text-anchor="middle">1 task · 1 call · Cerebras GLM 4.7 · structured JSON</text>
</svg>